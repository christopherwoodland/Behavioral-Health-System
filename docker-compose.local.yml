# Usage: docker compose --env-file docker.env -f docker-compose.local.yml up -d
# Copy docker.env.example to docker.env and fill in values (gitignored)
#
# LOCAL environment: password-based PostgreSQL auth with a local PG container.
# Use this for local development without Azure Managed Identity.

services:
  # BHS Functions API - Local Environment
  # Uses password-based PostgreSQL auth against a local Docker PG container
  api:
    image: bhs-api:local
    container_name: bhs-api-local
    build:
      context: .
      dockerfile: BehavioralHealthSystem.Functions/Dockerfile.local
    ports:
      - "7071:80"
    environment:
      # Storage connection - Uses Managed Identity (account name only)
      - AzureWebJobsStorage__accountName=${STORAGE_ACCOUNT_NAME}
      - DSM5_STORAGE_ACCOUNT_NAME=${DSM5_STORAGE_ACCOUNT_NAME}
      # Application Insights - Key Vault reference
      - APPLICATIONINSIGHTS_CONNECTION_STRING=${APPLICATIONINSIGHTS_CONNECTION_STRING}
      # Functions runtime
      - FUNCTIONS_WORKER_RUNTIME=dotnet-isolated
      - ASPNETCORE_ENVIRONMENT=Development
      - AZURE_FUNCTIONS_ENVIRONMENT=Development
      # Azure Speech - Managed Identity (no key)
      - AZURE_SPEECH_ENDPOINT=${AZURE_SPEECH_ENDPOINT}
      - AZURE_SPEECH_REGION=${AZURE_SPEECH_REGION}
      - AZURE_SPEECH_LOCALE=en-US
      - AZURE_SPEECH_API_VERSION=2024-11-15
      # Storage
      - DSM5_CONTAINER_NAME=dsm5-data
      - DSM5_EXTRACTION_METHOD=CONTENT_UNDERSTANDING
      # Azure OpenAI - Managed Identity (no key)
      - AZURE_OPENAI_ENABLED=true
      - AZURE_OPENAI_API_VERSION=2025-04-01-preview
      - AZURE_OPENAI_DEPLOYMENT=gpt-5-mini
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      # Extended Assessment OpenAI - Managed Identity (no key)
      - EXTENDED_ASSESSMENT_OPENAI_ENABLED=true
      - EXTENDED_ASSESSMENT_OPENAI_API_VERSION=2025-04-01-preview
      - EXTENDED_ASSESSMENT_OPENAI_DEPLOYMENT=gpt-5.2
      - EXTENDED_ASSESSMENT_OPENAI_ENDPOINT=${EXTENDED_ASSESSMENT_OPENAI_ENDPOINT}
      - EXTENDED_ASSESSMENT_OPENAI_MAX_TOKENS=4000
      - EXTENDED_ASSESSMENT_OPENAI_TEMPERATURE=0.2
      - EXTENDED_ASSESSMENT_OPENAI_TIMEOUT_SECONDS=120
      - EXTENDED_ASSESSMENT_USE_FALLBACK=false
      # Content Understanding - Managed Identity (no key)
      - AZURE_CONTENT_UNDERSTANDING_ENDPOINT=${AZURE_CONTENT_UNDERSTANDING_ENDPOINT}
      # Document Intelligence - Managed Identity (no key)
      - DocumentIntelligenceEndpoint=${DOCUMENT_INTELLIGENCE_ENDPOINT}
      - DSM5_DOCUMENT_INTELLIGENCE_ENDPOINT=${DSM5_DOCUMENT_INTELLIGENCE_ENDPOINT}
      # Grammar Correction Agent - Managed Identity (no API key)
      - AGENT_ENDPOINT=${AGENT_ENDPOINT}
      - AGENT_MODEL_DEPLOYMENT=gpt-5.2
      - AGENT_ENABLED=true
      - AGENT_SUPPORTS_TEMPERATURE=false
      - AGENT_SUPPORTS_MAX_TOKENS=false
      - AGENT_TIMEOUT_SECONDS=60
      - GRAMMAR_AGENT_NAME=GrammarCorrectionAgent
      - GRAMMAR_AGENT_INCLUDE_EXPLANATIONS=false
      - GRAMMAR_AGENT_PRESERVE_FORMATTING=true
      - GRAMMAR_AGENT_SUGGEST_ALTERNATIVES=false
      # Azure Storage
      - AZURE_STORAGE_ACCOUNT_NAME=${STORAGE_ACCOUNT_NAME}
      # Local DAM Model
      - LOCAL_DAM_BASE_URL=http://host.docker.internal:8000
      - LOCAL_DAM_INITIATE_PATH=initiate
      - LOCAL_DAM_PREDICTION_PATH=predict
      - LOCAL_DAM_MODEL_ID=KintsugiHealth/dam
      - LOCAL_DAM_TIMEOUT_SECONDS=300
      - LOCAL_DAM_WARMUP_ON_STARTUP=true
      - LOCAL_DAM_HEALTH_PATH=health
      - LOCAL_DAM_WARMUP_TIMEOUT_SECONDS=600
      - LOCAL_DAM_WARMUP_POLL_SECONDS=5
      # Azure Identity for Managed Identity
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      # Entra ID
      - ENTRA_TENANT_ID=${ENTRA_TENANT_ID}
      - ENTRA_CLIENT_ID=${ENTRA_CLIENT_ID}
      # PostgreSQL — LOCAL: password auth against local Docker PG container
      - STORAGE_BACKEND=PostgreSQL
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE=${POSTGRES_DB:-bhs_dev}
      - POSTGRES_USERNAME=${POSTGRES_USER:-bhs_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_USE_MANAGED_IDENTITY=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # PostgreSQL Database - Local
  # Data persisted via named volume across container restarts
  db:
    image: postgres:16-alpine
    container_name: bhs-db-local
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-bhs_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-bhs_dev}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - bhs-pgdata-local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bhs_admin} -d ${POSTGRES_DB:-bhs_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # BHS Web UI - Local Environment
  web:
    image: bhs-web:local
    container_name: bhs-web-local
    build:
      context: ./BehavioralHealthSystem.Web
      dockerfile: Dockerfile.development
    ports:
      - "5173:80"
    environment:
      # API Configuration
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
      # Azure AD / Entra ID Authentication
      - VITE_AZURE_ADMIN_GROUP_ID=${VITE_AZURE_ADMIN_GROUP_ID}
      - VITE_AZURE_AUTHORITY=${VITE_AZURE_AUTHORITY}
      - VITE_AZURE_CLIENT_ID=${VITE_AZURE_CLIENT_ID}
      - VITE_AZURE_CONTROL_PANEL_GROUP_ID=${VITE_AZURE_CONTROL_PANEL_GROUP_ID}
      - VITE_AZURE_KNOWN_AUTHORITIES=${VITE_AZURE_KNOWN_AUTHORITIES}
      - VITE_AZURE_REDIRECT_URI=${VITE_AZURE_REDIRECT_URI}
      - VITE_AZURE_TENANT_ID=${VITE_AZURE_TENANT_ID}
      # Feature Flags
      - VITE_ENABLE_AUTH=${VITE_ENABLE_AUTH}
      - VITE_ENABLE_ENTRA_AUTH=${VITE_ENABLE_ENTRA_AUTH:-false}
      - VITE_ENABLE_DEBUG_LOGGING=${VITE_ENABLE_DEBUG_LOGGING:-true}
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  bhs-pgdata-local:
    name: bhs-pgdata-local
    driver: local
