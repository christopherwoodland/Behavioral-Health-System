# Horizontal Pod Autoscaler for bhs-api
# Scales based on CPU utilisation.  DAM uses its own HPA.
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bhs-api-hpa
  namespace: bhs
  labels:
    app: bhs-api
    environment: dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bhs-api
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# HPA for bhs-web (lightweight — scale-out on traffic spikes)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bhs-web-hpa
  namespace: bhs
  labels:
    app: bhs-web
    environment: dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bhs-web
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
