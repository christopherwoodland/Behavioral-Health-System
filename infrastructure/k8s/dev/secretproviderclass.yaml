# SecretProviderClass: mounts Key Vault secrets into the api pod as env vars.
# The api workload UAMI (Workload Identity) is used to authenticate to Key Vault.
# Deploy-AKS.ps1 patches __KEY_VAULT_NAME__ and __UAMI_CLIENT_ID__ before applying.
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: bhs-api-kv-secrets
  namespace: bhs
  labels:
    app: bhs-api
    environment: dev
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    clientID: "__UAMI_CLIENT_ID__"
    keyvaultName: "__KEY_VAULT_NAME__"
    tenantId: "__KEY_VAULT_TENANT_ID__"
    objects: |
      array:
        - |
          objectName: KintsugiApiKey
          objectType: secret
          objectAlias: kintsugi-api-key
        - |
          objectName: ApplicationInsightsConnectionString
          objectType: secret
          objectAlias: appinsights-connection-string
  # Sync KV secrets to a Kubernetes Secret (so they can be referenced as envFrom)
  secretObjects:
    - secretName: bhs-api-kv-synced
      type: Opaque
      data:
        - objectName: kintsugi-api-key
          key: KINTSUGI_API_KEY
        - objectName: appinsights-connection-string
          key: APPLICATIONINSIGHTS_CONNECTION_STRING
