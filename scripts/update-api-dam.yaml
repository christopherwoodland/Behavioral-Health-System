properties:
  configuration:
    ingress:
      external: true
      targetPort: 80
      transport: auto
      allowInsecure: false
      corsPolicy:
        allowCredentials: true
        allowedHeaders:
          - "*"
        allowedMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
          - PATCH
        allowedOrigins:
          - https://bhs-ui-dam.thankfulmoss-a40a822d.eastus2.azurecontainerapps.io
          - https://bhs-dev-ui-4exbxrzknexso.proudsmoke-3a1aac14.eastus2.azurecontainerapps.io
  template:
    containers:
      - name: bhs-api-dam
        image: bhsdevelopmentacr4znv2wxlxs4xq.azurecr.io/bhs-api-dam:latest
        resources:
          cpu: 1.0
          memory: 2Gi
        env:
          - name: FUNCTIONS_WORKER_RUNTIME
            value: dotnet-isolated
          - name: ASPNETCORE_ENVIRONMENT
            value: Development
          - name: AZURE_FUNCTIONS_ENVIRONMENT
            value: Development
          - name: WEBSITE_HOSTNAME
            value: bhs-api-dam.thankfulmoss-a40a822d.eastus2.azurecontainerapps.io
          # Storage
          - name: AzureWebJobsStorage__accountName
            value: bhsdevstg4exbxrzknexso
          - name: AzureWebJobsStorage__credential
            value: managedidentity
          - name: AzureWebJobsStorage__blobServiceUri
            value: https://bhsdevstg4exbxrzknexso.blob.core.windows.net
          - name: AzureWebJobsStorage__queueServiceUri
            value: https://bhsdevstg4exbxrzknexso.queue.core.windows.net
          - name: AzureWebJobsStorage__tableServiceUri
            value: https://bhsdevstg4exbxrzknexso.table.core.windows.net
          - name: AZURE_STORAGE_ACCOUNT_NAME
            value: bhsdevstg4exbxrzknexso
          - name: DSM5_STORAGE_ACCOUNT_NAME
            value: bhsdevstg4exbxrzknexso
          # PostgreSQL
          - name: STORAGE_BACKEND
            value: PostgreSQL
          - name: POSTGRES_CONNECTION_STRING
            value: Host=localhost;Port=5432;Database=bhs_dev;Username=bhs_admin;Password=<REPLACE_WITH_POSTGRES_PASSWORD>
          # Entra ID
          - name: ENTRA_TENANT_ID
            value: 16b3c013-d300-468d-ac64-7eda0820b6d3
          - name: ENTRA_CLIENT_ID
            value: 98e8135d-5ca5-4015-b0ac-825ae189de20
          # DAM Model
          - name: USE_LOCAL_DAM_MODEL
            value: "true"
          - name: LOCAL_DAM_BASE_URL
            value: https://bhs-dam-selfhost.internal.thankfulmoss-a40a822d.eastus2.azurecontainerapps.io
          - name: LOCAL_DAM_INITIATE_PATH
            value: initiate
          - name: LOCAL_DAM_PREDICTION_PATH
            value: predict
          - name: LOCAL_DAM_TIMEOUT_SECONDS
            value: "300"
          # Azure OpenAI
          - name: AZURE_OPENAI_ENABLED
            value: "true"
          - name: AZURE_OPENAI_ENDPOINT
            value: https://bhs-development-public-foundry-r.cognitiveservices.azure.com/
          - name: AZURE_OPENAI_DEPLOYMENT
            value: gpt-4.1-mini
          - name: AZURE_OPENAI_API_VERSION
            value: "2025-04-14"
          # Extended Assessment
          - name: EXTENDED_ASSESSMENT_OPENAI_ENABLED
            value: "true"
          - name: EXTENDED_ASSESSMENT_OPENAI_ENDPOINT
            value: https://bhs-development-public-foundry-r.cognitiveservices.azure.com/
          - name: EXTENDED_ASSESSMENT_OPENAI_DEPLOYMENT
            value: gpt-5.2
          - name: EXTENDED_ASSESSMENT_OPENAI_API_VERSION
            value: "2025-04-01-preview"
          - name: EXTENDED_ASSESSMENT_OPENAI_MAX_TOKENS
            value: "4000"
          - name: EXTENDED_ASSESSMENT_OPENAI_TEMPERATURE
            value: "0.2"
          - name: EXTENDED_ASSESSMENT_OPENAI_TIMEOUT_SECONDS
            value: "120"
          - name: EXTENDED_ASSESSMENT_USE_FALLBACK
            value: "false"
          # Speech
          - name: AZURE_SPEECH_ENDPOINT
            value: https://bhs-development-public-foundry-r.cognitiveservices.azure.com/
          - name: AZURE_SPEECH_REGION
            value: eastus2
          - name: AZURE_SPEECH_LOCALE
            value: en-US
          - name: AZURE_SPEECH_API_VERSION
            value: "2024-11-15"
          - name: AZURE_SPEECH_ENHANCED_MODE
            value: "false"
          # Content Understanding / DSM5
          - name: AZURE_CONTENT_UNDERSTANDING_ENDPOINT
            value: https://bhs-development-public-foundry-r.services.ai.azure.com/
          - name: DSM5_EXTRACTION_METHOD
            value: CONTENT_UNDERSTANDING
          - name: DSM5_CONTAINER_NAME
            value: dsm5-data
          # Other
          - name: AGENT_MODE_ENABLED
            value: "false"
          - name: KINTSUGI_AUTO_PROVIDE_CONSENT
            value: "false"
          - name: KINTSUGI_BASE_URL
            value: https://api.kintsugihealth.com/v2
          - name: KINTSUGI_API_KEY
            secretRef: kintsugi-api-key
          - name: KINTSUGI_TIMEOUT_SECONDS
            value: "300"
          - name: KINTSUGI_MAX_RETRY_ATTEMPTS
            value: "3"
          - name: KINTSUGI_RETRY_DELAY_MS
            value: "1000"
          - name: ALLOWED_ORIGINS
            value: https://bhs-ui-dam.thankfulmoss-a40a822d.eastus2.azurecontainerapps.io,https://bhs-dev-ui-4exbxrzknexso.proudsmoke-3a1aac14.eastus2.azurecontainerapps.io
          - name: DEPLOY_TS
            value: "20260304-1930"
          - name: API_DEPLOYMENT_VERSION
            value: "20260304a-postgres"
      # PostgreSQL Sidecar Container
      # Runs alongside the API in the same pod, sharing localhost network
      # This approach bypasses Container Apps' Envoy proxy which doesn't support PostgreSQL wire protocol
      - name: postgres-sidecar
        image: postgres:16-alpine
        resources:
          cpu: 0.5
          memory: 1Gi
        env:
          - name: POSTGRES_USER
            value: bhs_admin
          - name: POSTGRES_PASSWORD
            value: <REPLACE_WITH_POSTGRES_PASSWORD>
          - name: POSTGRES_DB
            value: bhs_dev
